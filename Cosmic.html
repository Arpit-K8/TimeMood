<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Clock | Galaxy Mode</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            min-height: 100vh;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
        }
        
        .cosmic-container {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 
                0 0 60px rgba(99, 102, 241, 0.2),
                inset 0 0 20px rgba(165, 180, 252, 0.1);
            position: relative;
            overflow: hidden;
            z-index: 10;
        }
        
        .cosmic-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(236, 72, 153, 0.05) 0%, transparent 50%);
            animation: rotate 120s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .cosmic-title {
            font-family: 'Orbitron', sans-serif;
            color: #818cf8;
            text-shadow: 
                0 0 10px rgba(99, 102, 241, 0.5),
                0 0 20px rgba(99, 102, 241, 0.3);
            letter-spacing: 0.1em;
        }
        
        .cosmic-subtitle {
            font-family: 'Space Mono', monospace;
            color: #a5b4fc;
            opacity: 0.8;
            text-shadow: 0 0 5px rgba(165, 180, 252, 0.3);
        }
        
        /* Solar System Clock */
        .solar-system {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 2rem auto;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 
                inset 0 0 40px rgba(99, 102, 241, 0.1),
                0 0 40px rgba(99, 102, 241, 0.1);
        }
        
        .sun {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #fcd34d 0%, #f59e0b 70%);
            border-radius: 50%;
            box-shadow: 
                0 0 20px #f59e0b,
                0 0 40px #f59e0b,
                0 0 60px #f59e0b;
            z-index: 1;
        }
        
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
        }
        
        .hour-orbit {
            width: 200px;
            height: 200px;
            animation: orbit-hours 43200s linear infinite;
        }
        
        .minute-orbit {
            width: 140px;
            height: 140px;
            animation: orbit-minutes 3600s linear infinite;
        }
        
        .second-orbit {
            width: 80px;
            height: 80px;
            animation: orbit-seconds 60s linear infinite;
        }
        
        .planet {
            position: absolute;
            border-radius: 50%;
            transform-origin: center;
            top: 50%;
            left: 50%;
        }
        
        .hour-planet {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #818cf8 0%, #4f46e5 70%);
            box-shadow: 
                0 0 10px #818cf8,
                0 0 20px #818cf8;
            margin-top: -15px;
            margin-left: -15px;
            transform: translateX(100px);
        }
        
        .minute-planet {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #ec4899 0%, #be185d 70%);
            box-shadow: 
                0 0 10px #ec4899,
                0 0 20px #ec4899;
            margin-top: -10px;
            margin-left: -10px;
            transform: translateX(70px);
        }
        
        .second-planet {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #34d399 0%, #10b981 70%);
            box-shadow: 
                0 0 10px #34d399,
                0 0 20px #34d399;
            margin-top: -6px;
            margin-left: -6px;
            transform: translateX(40px);
        }
        
        @keyframes orbit-hours {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        @keyframes orbit-minutes {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        @keyframes orbit-seconds {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        .digital-clock {
            font-family: 'Orbitron', sans-serif;
            color: #a5b4fc;
            text-shadow: 
                0 0 5px rgba(165, 180, 252, 0.5),
                0 0 10px rgba(165, 180, 252, 0.3);
            letter-spacing: 0.1em;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(99, 102, 241, 0.2);
            box-shadow: 
                inset 0 0 10px rgba(99, 102, 241, 0.1),
                0 0 20px rgba(99, 102, 241, 0.1);
            padding: 1rem 2rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        
        .cosmic-button {
            background: linear-gradient(145deg, #4f46e5, #6366f1);
            border: none;
            box-shadow: 
                0 0 15px rgba(99, 102, 241, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .cosmic-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.7s;
        }
        
        .cosmic-button:hover::before {
            left: 100%;
        }
        
        .cosmic-button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 0 25px rgba(99, 102, 241, 0.7),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .cosmic-button:active {
            transform: translateY(0);
        }
        
        .cosmic-button:disabled {
            background: linear-gradient(145deg, #374151, #4b5563);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        
        /* Shooting stars */
        .shooting-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            filter: blur(1px);
            animation: shooting var(--duration) linear infinite;
            opacity: 0;
        }
        
        .shooting-star::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,1), rgba(255,255,255,0));
            transform-origin: left center;
            transform: rotate(20deg);
        }
        
        @keyframes shooting {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translateX(1000px) translateY(-300px);
                opacity: 0;
            }
        }

        .hub-back-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 60;
            text-decoration: none;
            color: #c7d2fe;
            background: rgba(13, 18, 34, 0.86);
            border: 1px solid rgba(129, 140, 248, 0.45);
            border-radius: 999px;
            padding: 0.5rem 0.9rem;
            font-size: 0.84rem;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 0 14px rgba(99, 102, 241, 0.24);
        }

        .hub-back-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <a href="Index.html" class="hub-back-link" aria-label="Back to mood hub">&larr; Back to Hub</a>
    <!-- Stars background -->
    <div class="stars" id="stars"></div>
    
    <div class="cosmic-container p-8 rounded-2xl w-full max-w-md text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-2 cosmic-title">COSMIC CLOCK</h1>
        <p class="cosmic-subtitle mb-6">Time flows like planets in orbit</p>
        
        <!-- Solar System Clock -->
        <div class="solar-system">
            <div class="sun"></div>
            
            <!-- Orbits (now rotating) -->
            <div class="orbit hour-orbit">
                <div class="planet hour-planet"></div>
            </div>
            
            <div class="orbit minute-orbit">
                <div class="planet minute-planet"></div>
            </div>
            
            <div class="orbit second-orbit">
                <div class="planet second-planet"></div>
            </div>
        </div>
        
        <!-- Digital clock display -->
        <div id="digitalClock" class="digital-clock">
            --:--:--
        </div>
        
        <button onclick="startClock()" id="startBtn" class="cosmic-button px-8 py-3 rounded-xl mt-6 transition-all duration-300 relative">
            ACTIVATE COSMIC TIME
        </button>
    </div>

    <script>
        // Create stars background
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const count = 200;
            
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.setProperty('--duration', `${Math.random() * 5 + 3}s`);
                star.style.animationDelay = `${Math.random() * 5}s`;
                starsContainer.appendChild(star);
            }
            
            // Add some shooting stars
            for (let i = 0; i < 5; i++) {
                createShootingStar();
            }
        }
        
        function createShootingStar() {
            const starsContainer = document.getElementById('stars');
            const star = document.createElement('div');
            star.className = 'shooting-star';
            star.style.left = `${Math.random() * 20}%`;
            star.style.top = `${Math.random() * 20}%`;
            star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
            star.style.animationDelay = `${Math.random() * 10}s`;
            starsContainer.appendChild(star);
            
            // Remove after animation completes
            setTimeout(() => {
                star.remove();
                // Create a new one
                setTimeout(createShootingStar, Math.random() * 10000);
            }, 3000);
        }
        
        // Initialize stars
        createStars();
        
        // Clock functionality
        let clockInterval = null;

        function updateClock() {
            const date = new Date();
            let hours = date.getHours();
            const minutes = date.getMinutes();
            const seconds = date.getSeconds();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            // Convert to 12-hour format
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 should be 12
            
            // Format to two digits
            const formattedHours = hours < 10 ? '0' + hours : hours;
            const formattedMinutes = minutes < 10 ? '0' + minutes : minutes;
            const formattedSeconds = seconds < 10 ? '0' + seconds : seconds;
            
            // Update digital display
            document.getElementById('digitalClock').textContent = 
                `${formattedHours}:${formattedMinutes}:${formattedSeconds} ${ampm}`;
        }

        function startClock() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = 'COSMIC TIME ACTIVE';
            btn.style.opacity = '0.7';
            btn.style.cursor = 'not-allowed';

            updateClock();
            clockInterval = setInterval(updateClock, 1000);
        }
    </script>
</body>
</html>
